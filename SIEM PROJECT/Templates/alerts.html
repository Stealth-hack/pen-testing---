<html>
<head>
    <title>SIEM Alerts</title>
</head>
<body>
    <h1>Active Alerts</h1>
    <a href="/">Back to Events</a>
    <br><br>
    {% if alerts %}
        <table border="1">
            <tr>
                <th>Message</th>
                <th>Count</th>
            </tr>
            {% for alert in alerts %}
            <tr>
                <td>{{ alert[0] }}</td>
                <td>{{ alert[1] }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No alerts detected.</p>
    {% endif %}
</body>
</html>
